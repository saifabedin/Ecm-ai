version: "3.8"

services:
  api:
    build: .
    command: node backend/api-server.cjs
    env_file: .env
    ports: ["4000:4000"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build: .
    command: node backend/queues/worker.cjs
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  mcp:
    build: .
    command: node backend/mcp/server.cjs
    env_file: .env
    ports: ["127.0.0.1:3000:3000"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --bind 0.0.0.0 --save ""
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

